<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamify | Ultimate OTT Experience</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Stream<span>ify</span></div>
        <nav class="nav-links">
            <a href="#" class="nav-item active" data-target="home">Home</a>
            <a href="#" class="nav-item" data-target="movies">Movies</a>
            <a href="#" class="nav-item" data-target="tv-shows">TV Shows</a>
            <a href="#" class="nav-item" data-target="my-list">My List</a>
        </nav>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search titles, genres...">
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main>
        <section id="hero-banner" class="hero-banner"></section>

        <section class="feature-strip">
            <div class="feature-card"><i class="fas fa-bolt"></i><span>Trending Now</span></div>
            <div class="feature-card"><i class="fas fa-star"></i><span>Top Rated</span></div>
            <div class="feature-card"><i class="fas fa-film"></i><span>New Releases</span></div>
            <div class="feature-card"><i class="fas fa-tv"></i><span>Web Series</span></div>
        </section>

        <section class="category-banner">
            <div>
                <h2>Unlimited Movies, Shows & Originals</h2>
                <p>Discover popular titles, save favorites, and explore more entertainment in one place.</p>
            </div>
        </section>

        <section id="content-display" class="content-container"></section>
    </main>

    <div id="details-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Streamify. Made for Python-FSD Project.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
